driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: <%= ENV['KITCHEN_PRODUCT_NAME'] || 'chef' %>
  deprecations_as_errors: true
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04
  - name: freebsd-13

suites:
  - name: default
    provisioner:
      named_run_list: default
    run_list:
      - recipe[test::default]
    verifier:
      inspec_tests:
        - path: test/integration/default
    excludes:
      - windows-latest
  - name: windows
    provisioner:
      named_run_list: windows
    run_list:
      - recipe[test::windows]
    verifier:
      inspec_tests:
        - path: test/integration/windows
    includes:
      - windows-latest
