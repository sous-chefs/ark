---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.4
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - almalinux-8
          - almalinux-9
          - almalinux-10
          - amazonlinux-2023
          - centos-stream-9
          - centos-stream-10
          - debian-12
          - debian-13
          - fedora-latest
          - opensuse-leap-15
          - oraclelinux-8
          - oraclelinux-9
          - rockylinux-8
          - rockylinux-9
          - rockylinux-10
          - ubuntu-2204
          - ubuntu-2404
        suite:
          - default
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.4
        with:
          version: "25"
      - name: Dokken
        uses: actionshub/test-kitchen@3.0.0
        env:
          CHEF_VERSION: "18"
          CHEF_LICENSE: accept-no-persist
          KITCHEN_PRODUCT_NAME: cinc
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}

  integration-windows:
    needs: lint-unit
    runs-on: windows-latest
    strategy:
      matrix:
        os:
          - windows-latest
        suite:
          - windows
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.4
        with:
          version: "25"
      - name: test-kitchen
        uses: actionshub/test-kitchen@3.0.0
        timeout-minutes: 30
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_PRODUCT_NAME: cinc
          KITCHEN_LOCAL_YAML: kitchen.exec.yml
        with:
          action: converge
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
      - name: Verify Windows archive extraction
        shell: pwsh
        run: |
          $paths = @(
            'C:\dir',
            'C:\dir\foo1.txt',
            'C:\dir\bin\do_foo'
          )

          foreach ($path in $paths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Expected path missing: $path"
            }
          }
      - name: Clean up Windows test artifacts
        if: always()
        shell: pwsh
        run: |
          Remove-Item -LiteralPath 'C:\dir' -Recurse -Force -ErrorAction SilentlyContinue
          Remove-LocalUser -Name foobarbaz -ErrorAction SilentlyContinue
          Remove-LocalGroup -Name foobar -ErrorAction SilentlyContinue

  integration-macos:
    needs: lint-unit
    runs-on: macos-latest
    strategy:
      matrix:
        os:
          - macos-latest
        suite:
          - default
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.4
        with:
          version: "25"
      - name: test-kitchen
        uses: actionshub/test-kitchen@3.0.0
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_PRODUCT_NAME: cinc
          KITCHEN_LOCAL_YAML: kitchen.exec.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
